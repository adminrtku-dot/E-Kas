<!-- 1. LOGIN PAGE -->
<div id="pageLogin" class="flex-1 flex flex-col justify-center">
                <h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">Masuk ke Akun Anda</h2>
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fas fa-user"></i>
                            </div>
                            <input type="text" id="username" required class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors" placeholder="Masukkan username">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                <i class="fas fa-lock"></i>
                            </div>
                            <input type="password" id="password" required class="w-full pl-10 pr-10 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors" placeholder="Masukkan password">
                            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-green-600 focus:outline-none">
                                <i class="fas fa-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" id="btnLogin" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2.5 rounded-lg transition-colors flex justify-center items-center">
                        Masuk
                    </button>
                </form>
                
                <div class="mt-8 text-center text-sm text-gray-500">
                    Belum punya akun atau lupa password?<br>
                    <a href="https://wa.me/6285730647464?text=Halo%20%5FAdmin%5F,%20saya%20ingin%20request%20username%20dan%20password%20untuk%20%2A%5FAplikasi%20Kas%20Warga%20Gg.%20Mutiara%20II%5F%2A.%0ANama%20%20%20%20%20%20%20%20%20:%0AUsername%20:%0APassword%20%20:%0A%5FTerima%20kasih.%5F" target="_blank" class="inline-flex items-center mt-2 text-green-600 hover:text-green-800 font-medium">
                        <i class="fab fa-whatsapp text-lg mr-1"></i> Request via WhatsApp
                    </a>
                </div>
                
     
            </div>
